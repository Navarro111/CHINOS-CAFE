<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso POS | CHINOS CAFE</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main class="login-shell">
    <div class="panel login-card">
      <div class="brand" style="margin-bottom:18px;">
        <strong>CHINOS CAFE</strong>
        <span>Acceso al Sistema POS</span>
      </div>

      <form id="loginForm">
        <div class="field">
          <label for="email">Correo</label>
          <input id="email" type="email" required />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" type="password" required />
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;">Iniciar sesión</button>
        <p id="loginStatus" class="status"></p>
      </form>

      <div style="margin-top:18px;">
        <a href="./index.html" class="btn btn-dark" style="display:inline-block;">Volver al sitio</a>
      </div>
    </div>
  </main>

  <script type="module" src="./js/login.js"></script>
</body>
</html>
